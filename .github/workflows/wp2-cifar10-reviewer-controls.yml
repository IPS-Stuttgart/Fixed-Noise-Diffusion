name: WP2 CIFAR-10 reviewer controls

#checkov:skip=CKV_GHA_7:Manual research workflow intentionally exposes bounded runner, seed, and runtime parameters.
on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Training epochs; also used as the final checkpoint epoch"
        required: true
        default: "100"
      run_group:
        description: "Output group name under runs/"
        required: true
        default: "wp2_cifar10_reviewer_controls_100ep"
      data_dir:
        description: "Persistent CIFAR-10 cache on the self-hosted runner; leave empty to use $HOME/.cache/datasets/fixed-noise-diffusion"
        required: false
        default: ""
      eval_subset_size:
        description: "Validation subset size for denoising diagnostics"
        required: true
        default: "2048"
      pool_dtype:
        description: "Fixed-pool storage dtype for reviewer-control runs"
        required: true
        default: "float32"
      cuda_visible_devices:
        description: "Optional CUDA_VISIBLE_DEVICES value; leave empty to use the runner default"
        required: false
        default: ""
      run_timestep_diagnostics:
        description: "Run final-checkpoint timestep-local denoising diagnostics"
        required: true
        type: boolean
        default: true
      timestep_values:
        description: "Comma-separated timesteps for timestep-local diagnostics"
        required: true
        default: "0,25,50,100,200,400,600,800,999"
      diagnostic_batches:
        description: "Batches for held-out-pool and timestep diagnostic passes"
        required: true
        default: "16"
      run_fid:
        description: "Also run a compact FID/KID sample-quality check"
        required: true
        type: boolean
        default: false
      fid_sample_count:
        description: "Generated samples for optional FID/KID"
        required: true
        default: "2048"
      fid_real_count:
        description: "Real training images for optional FID/KID"
        required: true
        default: "50000"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cifar10-reviewer-controls:
    name: cifar10-reviewer-pool${{ matrix.pool_size }}-${{ inputs.pool_dtype }}-seed${{ matrix.seed }}
    runs-on: [self-hosted, Linux]
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        pool_size: [1000, 10000, 100000]
        seed: [0]

    env:
      PYTHONPATH: src
      PYTHONNOUSERSITE: "1"
      OUTPUT_ROOT: runs/${{ inputs.run_group }}
      DATA_DIR: ${{ inputs.data_dir }}
      PIP_CACHE_DIR: ${{ inputs.data_dir }}/pip-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve self-hosted dataset cache paths
        shell: bash
        run: |
          set -euo pipefail
          TILDE_PREFIX=\~/
          HOME_PREFIX=\$HOME/
          if [ -z "${DATA_DIR:-}" ]; then
            DATA_DIR="${HOME}/.cache/datasets/fixed-noise-diffusion"
          elif [[ "${DATA_DIR}" == "${TILDE_PREFIX}"* ]]; then
            DATA_DIR="${HOME}/${DATA_DIR#"${TILDE_PREFIX}"}"
          elif [[ "${DATA_DIR}" == "${HOME_PREFIX}"* ]]; then
            DATA_DIR="${HOME}/${DATA_DIR#"${HOME_PREFIX}"}"
          fi
          PIP_CACHE_DIR="${DATA_DIR}/pip-cache"
          mkdir -p "${DATA_DIR}" "${PIP_CACHE_DIR}"
          echo "DATA_DIR=${DATA_DIR}" >> "$GITHUB_ENV"
          echo "PIP_CACHE_DIR=${PIP_CACHE_DIR}" >> "$GITHUB_ENV"
          echo "data_dir=${DATA_DIR}"
          echo "pip_cache_dir=${PIP_CACHE_DIR}"

      - name: Runner and cache diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "runner.name=${RUNNER_NAME:-unset}"
          echo "runner.os=${RUNNER_OS:-unset}"
          echo "runner.arch=${RUNNER_ARCH:-unset}"
          echo "workspace=${GITHUB_WORKSPACE}"
          echo "data_dir=${DATA_DIR}"
          echo "pip_cache_dir=${PIP_CACHE_DIR}"
          mkdir -p "${DATA_DIR}" "${PIP_CACHE_DIR}"
          df -h "${GITHUB_WORKSPACE}" "${DATA_DIR}" || true
          python --version
          python -m pip --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          if [ "${{ inputs.run_fid }}" = "true" ]; then
            python -m pip install -e '.[metrics]'
          else
            python -m pip install -e .
          fi
          python - <<'PY'
          import torch

          print(
              f"torch={torch.__version__}; cuda={torch.version.cuda}; "
              f"cuda_available={torch.cuda.is_available()}"
          )
          if not torch.cuda.is_available():
              raise SystemExit("CUDA is required for this self-hosted workflow")
          print(f"device={torch.cuda.get_device_name(0)}")
          PY

      - name: Ensure CIFAR-10 dataset cache
        uses: ./.github/actions/ensure-torchvision-dataset
        with:
          dataset: cifar10
          data-root: ${{ env.DATA_DIR }}
          python: python

      - name: Run CIFAR-10 reviewer-control condition
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.cuda_visible_devices }}" ]; then
            export CUDA_VISIBLE_DEVICES="${{ inputs.cuda_visible_devices }}"
          fi

          POOL_SIZE="${{ matrix.pool_size }}"
          POOL_DTYPE="${{ inputs.pool_dtype }}"
          SEED="${{ matrix.seed }}"
          EPOCHS="${{ inputs.epochs }}"
          RUN_NAME="wp2_${EPOCHS}ep_cifar10_reviewer_pool_${POOL_SIZE}_${POOL_DTYPE}_seed${SEED}"
          mkdir -p "${OUTPUT_ROOT}"

          python -m fixed_noise_diffusion.train \
            --config cifar10_base.yaml \
            --set "run_name=${RUN_NAME}" \
            --set "output_dir=${OUTPUT_ROOT}" \
            --set "seed=${SEED}" \
            --set "data.data_dir=${DATA_DIR}" \
            --set "data.download=false" \
            --set "data.eval_subset_size=${{ inputs.eval_subset_size }}" \
            --set "diffusion.beta_schedule=cosine" \
            --set "training.epochs=${EPOCHS}" \
            --set "training.checkpoint_epochs=[${EPOCHS}]" \
            --set "training.save_checkpoint=true" \
            --set "evaluation.enable_metrics=false" \
            --set "evaluation.enable_heldout_pool=true" \
            --set "evaluation.sample_count=0" \
            --set "noise.mode=fixed_pool" \
            --set "noise.pool_size=${POOL_SIZE}" \
            --set "noise.pool_seed=4242" \
            --set "noise.pool_dtype=${POOL_DTYPE}"

          RUN_DIR="${OUTPUT_ROOT}/${RUN_NAME}"
          COMPACT_DIR="compact_artifacts/${RUN_NAME}"
          mkdir -p "${COMPACT_DIR}"
          for file in metrics.csv metrics.jsonl config.yaml run_metadata.json run_summary.json; do
            if [ -f "${RUN_DIR}/${file}" ]; then
              cp "${RUN_DIR}/${file}" "${COMPACT_DIR}/${file}"
            fi
          done

          python -m fixed_noise_diffusion.evaluate_pool_generalization \
            --sweep-dir "${OUTPUT_ROOT}" \
            --run "${RUN_NAME}" \
            --output-dir "${OUTPUT_ROOT}/pool_generalization_${RUN_NAME}" \
            --epochs "${EPOCHS}" \
            --batches "${{ inputs.diagnostic_batches }}"
          cp "${OUTPUT_ROOT}/pool_generalization_${RUN_NAME}"/pool_generalization* "${COMPACT_DIR}/"

          if [ "${{ inputs.run_timestep_diagnostics }}" = "true" ]; then
            python -m fixed_noise_diffusion.evaluate_timestep_diagnostics \
              --sweep-dir "${OUTPUT_ROOT}" \
              --run "${RUN_NAME}" \
              --output-dir "${OUTPUT_ROOT}/timestep_diagnostics_${RUN_NAME}" \
              --epochs "${EPOCHS}" \
              --timesteps "${{ inputs.timestep_values }}" \
              --batches "${{ inputs.diagnostic_batches }}"
            cp "${OUTPUT_ROOT}/timestep_diagnostics_${RUN_NAME}"/timestep_diagnostics* "${COMPACT_DIR}/"
            cp "${OUTPUT_ROOT}/timestep_diagnostics_${RUN_NAME}"/timestep_gap_by_timestep.png "${COMPACT_DIR}/"
          fi

          if [ "${{ inputs.run_fid }}" = "true" ]; then
            python -m fixed_noise_diffusion.evaluate_sample_quality \
              --sweep-dir "${OUTPUT_ROOT}" \
              --run "${RUN_NAME}" \
              --output-dir "${OUTPUT_ROOT}/sample_quality_${RUN_NAME}" \
              --epochs "${EPOCHS}" \
              --sample-count "${{ inputs.fid_sample_count }}" \
              --real-count "${{ inputs.fid_real_count }}" \
              --real-split train \
              --fid-feature 2048 \
              --sample-steps 50
            cp "${OUTPUT_ROOT}/sample_quality_${RUN_NAME}"/sample_quality* "${COMPACT_DIR}/"
          fi

      - name: Upload compact run artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cifar10-reviewer-pool${{ matrix.pool_size }}-${{ inputs.pool_dtype }}-seed${{ matrix.seed }}-compact
          path: compact_artifacts/
          if-no-files-found: warn
          retention-days: 30
