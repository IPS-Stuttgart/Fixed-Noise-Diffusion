name: WP2 CelebA64 validation

on:
  workflow_dispatch:
    inputs:
      runner_labels_json:
        description: "JSON array of self-hosted Linux runner labels"
        required: true
        default: '["self-hosted", "Linux"]'
      seed_list_json:
        description: "JSON array of seeds to run"
        required: true
        default: "[0]"
      epochs:
        description: "Training epochs; also used as the final checkpoint epoch"
        required: true
        default: "50"
      run_group:
        description: "Output group name under runs/"
        required: true
        default: "wp2_celeba64_pilot"
      data_dir:
        description: "Persistent CelebA cache on the self-hosted runner"
        required: true
        default: "/home/github-runner/cache/datasets/fixed-noise-diffusion"
      subset_size:
        description: "Training subset size; use none for full CelebA train split"
        required: true
        default: "50000"
      eval_subset_size:
        description: "Validation subset size for denoising diagnostics"
        required: true
        default: "2048"
      cuda_visible_devices:
        description: "Optional CUDA_VISIBLE_DEVICES value; leave empty to use the runner default"
        required: false
        default: ""
      run_fid:
        description: "Also run FID2048 evaluation from the final checkpoint"
        required: true
        type: boolean
        default: false
      fid_sample_count:
        description: "Generated samples for optional FID evaluation"
        required: true
        default: "10000"
      fid_real_count:
        description: "Real training images for optional FID evaluation"
        required: true
        default: "50000"

env:
  # Keep the runtime opt-in explicit while using Node-24-native action versions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  celeba64-validation:
    name: celeba64-${{ matrix.condition }}-seed${{ matrix.seed }}
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        seed: ${{ fromJSON(inputs.seed_list_json) }}
        condition: [gaussian, fixed_pool_1k, fixed_pool_10k, fixed_pool_100k]

    env:
      PYTHONPATH: src
      PYTHONNOUSERSITE: "1"
      OUTPUT_ROOT: runs/${{ inputs.run_group }}
      DATA_DIR: ${{ inputs.data_dir }}
      # Use a persistent local pip cache on the self-hosted runner instead of
      # actions/setup-python's remote Actions cache. The latter produced
      # intermittent Azure authentication failures during cache restore.
      PIP_CACHE_DIR: ${{ inputs.data_dir }}/pip-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Runner and cache diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "runner.name=${RUNNER_NAME:-unset}"
          echo "runner.os=${RUNNER_OS:-unset}"
          echo "runner.arch=${RUNNER_ARCH:-unset}"
          echo "workspace=${GITHUB_WORKSPACE}"
          echo "data_dir=${DATA_DIR}"
          echo "pip_cache_dir=${PIP_CACHE_DIR}"
          mkdir -p "${DATA_DIR}" "${PIP_CACHE_DIR}"
          df -h "${GITHUB_WORKSPACE}" "${DATA_DIR}" || true
          python --version
          python -m pip --version
          python -m pip cache dir

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          python -m pip install -e .
          python -m pip install gdown
          if [ "${{ inputs.run_fid }}" = "true" ]; then
            python -m pip install -e '.[metrics]'
          fi
          python - <<'PY'
          import torch
          import torchvision
          print(f"torch={torch.__version__}; cuda={torch.version.cuda}; cuda_available={torch.cuda.is_available()}")
          if torch.cuda.is_available():
              print(f"device={torch.cuda.get_device_name(0)}")
          PY

      - name: Prepare CelebA dataset cache
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DATA_DIR}"
          (
            flock 9
            python - <<'PY'
          import os
          from torchvision import datasets

          root = os.environ["DATA_DIR"]

          def check_cache() -> bool:
              ok = True
              for split in ("train", "valid"):
                  try:
                      dataset = datasets.CelebA(
                          root=root,
                          split=split,
                          target_type="attr",
                          download=False,
                      )
                      print(f"CelebA {split} cache hit: {len(dataset)} examples")
                  except RuntimeError as exc:
                      print(f"CelebA {split} cache miss: {exc}")
                      ok = False
              return ok

          if check_cache():
              print(f"CelebA cache ready at {root}; no download needed")
          else:
              print(f"Preparing CelebA cache at {root}")
              for split in ("train", "valid"):
                  datasets.CelebA(
                      root=root,
                      split=split,
                      target_type="attr",
                      download=True,
                  )
              if not check_cache():
                  raise RuntimeError(f"CelebA cache was not valid after download at {root}")
              print(f"CelebA cache ready at {root}")
          PY
          ) 9>"${DATA_DIR}/.celeba_download.lock"

      - name: Run CelebA64 condition
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.cuda_visible_devices }}" ]; then
            export CUDA_VISIBLE_DEVICES="${{ inputs.cuda_visible_devices }}"
          fi

          CONDITION="${{ matrix.condition }}"
          SEED="${{ matrix.seed }}"
          EPOCHS="${{ inputs.epochs }}"
          RUN_NAME="wp2_${EPOCHS}ep_celeba64_${CONDITION}_seed${SEED}"
          mkdir -p "${OUTPUT_ROOT}"

          case "${CONDITION}" in
            gaussian)
              NOISE_MODE="gaussian"
              POOL_SIZE="null"
              ;;
            fixed_pool_1k)
              NOISE_MODE="fixed_pool"
              POOL_SIZE="1000"
              ;;
            fixed_pool_10k)
              NOISE_MODE="fixed_pool"
              POOL_SIZE="10000"
              ;;
            fixed_pool_100k)
              NOISE_MODE="fixed_pool"
              POOL_SIZE="100000"
              ;;
            *)
              echo "Unknown condition: ${CONDITION}" >&2
              exit 2
              ;;
          esac

          EXTRA_SETS=()
          if [ "${{ inputs.subset_size }}" != "none" ]; then
            EXTRA_SETS+=(--set "data.subset_size=${{ inputs.subset_size }}")
          fi

          python -m fixed_noise_diffusion.train \
            --config celeba64_base.yaml \
            --set "run_name=${RUN_NAME}" \
            --set "output_dir=${OUTPUT_ROOT}" \
            --set "seed=${SEED}" \
            --set "data.data_dir=${DATA_DIR}" \
            --set "data.download=false" \
            --set "data.eval_subset_size=${{ inputs.eval_subset_size }}" \
            --set "diffusion.beta_schedule=cosine" \
            --set "training.epochs=${EPOCHS}" \
            --set "training.checkpoint_epochs=[${EPOCHS}]" \
            --set "training.save_checkpoint=true" \
            --set "noise.mode=${NOISE_MODE}" \
            --set "noise.pool_size=${POOL_SIZE}" \
            "${EXTRA_SETS[@]}"

          RUN_DIR="${OUTPUT_ROOT}/${RUN_NAME}"
          COMPACT_DIR="compact_artifacts/${RUN_NAME}"
          mkdir -p "${COMPACT_DIR}"
          for file in metrics.csv metrics.jsonl config.yaml run_metadata.json run_summary.json; do
            if [ -f "${RUN_DIR}/${file}" ]; then
              cp "${RUN_DIR}/${file}" "${COMPACT_DIR}/${file}"
            fi
          done

          if [ "${{ inputs.run_fid }}" = "true" ]; then
            python -m fixed_noise_diffusion.evaluate_sample_quality \
              --sweep-dir "${OUTPUT_ROOT}" \
              --output-dir "${OUTPUT_ROOT}/sample_quality_${RUN_NAME}" \
              --run "${RUN_NAME}" \
              --epochs "${EPOCHS}" \
              --sample-count "${{ inputs.fid_sample_count }}" \
              --real-count "${{ inputs.fid_real_count }}" \
              --real-split train \
              --fid-feature 2048 \
              --sample-steps 50
            cp "${OUTPUT_ROOT}/sample_quality_${RUN_NAME}/sample_quality.csv" "${COMPACT_DIR}/sample_quality.csv"
            cp "${OUTPUT_ROOT}/sample_quality_${RUN_NAME}/sample_quality.jsonl" "${COMPACT_DIR}/sample_quality.jsonl"
          fi

      - name: Upload compact run artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: celeba64-${{ matrix.condition }}-seed${{ matrix.seed }}-compact
          path: compact_artifacts/
          if-no-files-found: warn
          retention-days: 14
